<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L&M Ofertas - Promoção Exclusiva</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* Estilo focado em Conversão (ADS) */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #333;
      }
      .header {
        background-color: #fff;
        width: 100%;
        padding: 15px 0;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .logo {
        font-weight: bold;
        color: #e91e63;
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .container {
        max-width: 450px;
        width: 90%;
        background: #fff;
        margin-top: 20px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        padding-bottom: 30px;
      }
      .product-img {
        width: 100%;
        height: auto;
        display: block;
      }

      .content {
        padding: 20px;
        text-align: center;
      }
      .badge {
        background: #ffeb3b;
        color: #000;
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
        display: inline-block;
        margin-bottom: 10px;
      }
      h1 {
        font-size: 20px;
        margin: 10px 0;
        color: #222;
      }
      .price {
        font-size: 28px;
        color: #2e7d32;
        font-weight: bold;
        margin: 15px 0;
      }
      .old-price {
        text-decoration: line-through;
        color: #888;
        font-size: 16px;
      }

      /* Botão Principal - Call to Action */
      .btn-buy {
        background-color: #e91e63;
        color: white;
        text-decoration: none;
        padding: 18px 30px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 18px;
        display: block;
        margin: 20px 0;
        transition: 0.3s;
        box-shadow: 0 4px 10px rgba(233, 30, 99, 0.3);
      }
      .btn-buy:hover {
        transform: scale(1.05);
        background-color: #c2185b;
      }

      .shipping {
        color: #2e7d32;
        font-weight: bold;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      /* Botão WhatsApp Flutuante */
      .whatsapp-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #25d366;
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        z-index: 100;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">L&M Ofertas</div>
    </div>

    <div class="container">
      <img
        src="https://http2.mlstatic.com/D_NQ_NP_2X_965881-MLU77620603539_072024-F.webp"
        alt="Produto"
        class="product-img"
      />

      <div class="content">
        <div class="badge">🔥 OFERTA POR TEMPO LIMITADO</div>
        <h1>Kit Premium 19 Peças Cozinha Silicone</h1>

        <p class="old-price">De: R$ 120,00</p>
        <p class="price">Por apenas: R$ 70,00</p>

        <div class="shipping">
          <i class="fas fa-truck"></i> Frete Grátis para Recife e Região!
        </div>

        <a href="https://meli.la/2WYR2aB" class="btn-buy"
          >GARANTIR COM DESCONTO <i class="fas fa-arrow-right"></i
        ></a>

        <p style="font-size: 12px; color: #888">
          Compra 100% Segura via Mercado Livre / Shopee
        </p>
      </div>
    </div>

    <a
      href="https://whatsapp.com/channel/0029VbCPxWB9xVJmh7zaXZ2c"
      class="whatsapp-float"
      target="_blank"
      title="Entrar no Grupo VIP"
    >
      <i class="fab fa-whatsapp"></i>
    </a>
  </body>
</html>
