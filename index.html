<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L&M Ofertas | Promoção Exclusiva</title>

    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",
        "https://connect.facebook.net/en_US/fbevents.js",
      );
      fbq("init", "576877975267309");
      fbq("track", "PageView");
    </script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0b1622;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        color: white;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 400px;
        background-color: #162435;
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        margin-top: 10px;
      }

      .product-img {
        width: 100%;
        border-radius: 15px;
        margin-bottom: 15px;
        border: 2px solid #1a2a3a;
      }

      .price-tag {
        font-size: 1.8rem;
        color: #2ecc71;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .btn {
        display: block;
        text-decoration: none;
        padding: 18px;
        border-radius: 12px;
        font-weight: bold;
        margin-bottom: 15px;
        transition: transform 0.2s;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-shopee {
        background-color: #ee4d2d;
        color: white;
        font-size: 1.1rem;
        box-shadow: 0 4px 15px rgba(238, 77, 45, 0.3);
      }

      .divider {
        margin: 20px 0;
        display: flex;
        align-items: center;
        color: #666;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #333;
        margin: 0 10px;
      }

      .btn-whats {
        background-color: #25d366;
        color: white;
        font-size: 1rem;
        box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        70% {
          transform: scale(1.02);
        }
        100% {
          transform: scale(1);
        }
      }

      .social-proof {
        font-size: 0.8rem;
        color: #a0aec0;
        margin-top: 15px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        src="./img/carregador.png"
        alt="Produto em Oferta"
        class="product-img"
      />

      <div class="price-tag">R$ 39,98</div>

      <a
        href="https://s.shopee.com.br/50V0LLSPKR"
        class="btn btn-shopee"
        onclick="fbq('track', 'Purchase')"
      >
        🛒 COMPRAR NA SHOPEE
      </a>

      <div class="divider">Ou aproveite no grupo</div>

      <a
        href="https://chat.whatsapp.com/DZSmBWszAzn3smdcN39AdJ"
        class="btn btn-whats"
        onclick="fbq('track', 'Contact')"
      >
        ✅ ENTRAR NO GRUPO VIP
      </a>

      <div class="social-proof">👤 JÁ SOMOS +1.000 MEMBROS NO GRUPO</div>
    </div>
  </body>
</html>
