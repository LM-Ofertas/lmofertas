<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L&M Ofertas | Grupo VIP</title>
    <style>
        :root { --green: #25D366; --dark: #1a1a1a; --gray: #666; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 30px; padding: 40px 30px; text-center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .logo-text { font-size: 28px; font-weight: 900; color: var(--dark); margin-bottom: 10px; letter-spacing: -1px; }
        .logo-text span { color: var(--green); }
        .desc { color: var(--gray); font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .status-box { background: #f9f9f9; padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #f0f0f0; }
        .status-box p { font-size: 13px; font-weight: 600; color: #444; }
        .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn { display: block; background: var(--green); color: white; text-decoration: none; font-size: 18px; font-weight: 800; padding: 18px; border-radius: 18px; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); transition: transform 0.2s; margin-top: 10px; }
        .btn:active { transform: scale(0.96); }
        .footer { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-text">L&M <span>Ofertas</span></div>
        <p class="desc">Receba achadinhos da Shopee e Mercado Livre com até <b>70% OFF</b> e Frete Grátis direto no seu celular.</p>
        
        <div class="status-box">
            <div class="badge"><div class="dot"></div> Grupo Atualizado Hoje</div>
            <p>Acesse cupons exclusivos que expiram em poucos minutos! ⚡</p>
        </div>

        <a href="https://chat.whatsapp.com/DZSmBWszAzn3smdcN39AdJ" class="btn">ENTRAR NO GRUPO VIP</a>

        <p class="footer">🔒 Ambiente 100% Seguro & Gratuito</p>
    </div>
</body>
</html>
