<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificação de Segurança | Site Oficial</title>
    
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=AW-18033485808"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "AW-18033485808");
    </script>

    <style>
      body {
        font-family: sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .box {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        max-width: 350px;
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #6200ea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      h2 {
        color: #333;
        font-size: 18px;
      }
      p {
        color: #666;
        font-size: 14px;
      }
      .btn {
        display: none;
        background: #6200ea;
        color: white;
        text-decoration: none;
        padding: 15px;
        border-radius: 8px;
        font-weight: bold;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div id="loading">
        <div class="loader"></div>
        <h2>Verificando Site Oficial...</h2>
        <p>
          Aguarde um momento enquanto redirecionamos você para o ambiente seguro
          do MounjaroCaps.
        </p>
      </div>

      <a
        href="https://ev.braip.com/ref?pv=pro4qe7m&af=afi07p9xn8"
        id="btn-link"
        class="btn"
        >ACESSAR SITE OFICIAL</a
      >
    </div>

    <script>
      // Redirecionamento Automático após 3 segundos
      setTimeout(function () {
        window.location.href =
          "https://ev.braip.com/ref?pv=pro4qe7m&af=afi07p9xn8";
      }, 3000);

      // Se demorar muito, mostra o botão
      setTimeout(function () {
        document.getElementById("loading").style.display = "none";
        document.getElementById("btn-link").style.display = "block";
      }, 5000);
    </script>
  </body>
</html>
