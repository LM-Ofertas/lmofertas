<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L&M Ofertas | Canal VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .bg-mesh {
        background-color: #f8fafc;
        background-image:
          radial-gradient(at 0% 0%, rgba(34, 197, 94, 0.1) 0, transparent 50%),
          radial-gradient(
            at 100% 100%,
            rgba(59, 130, 246, 0.1) 0,
            transparent 50%
          );
      }
      @keyframes pulse-soft {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        50% {
          transform: scale(1.02);
          box-shadow: 0 0 0 20px rgba(34, 197, 94, 0);
        }
      }
      .animate-pulse-custom {
        animation: pulse-soft 2s infinite;
      }
    </style>
  </head>
  <body class="bg-mesh min-h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-md bg-white/80 backdrop-blur-md border border-white rounded-[2.5rem] shadow-2xl p-8 text-center"
    >
      <div class="relative inline-block mb-6">
        <div
          class="absolute -inset-1 bg-gradient-to-r from-green-400 to-blue-500 rounded-full blur opacity-30"
        ></div>
        <div class="relative bg-white p-1 rounded-full shadow-lg">
          <div
            class="w-24 h-24 rounded-full bg-green-500 flex items-center justify-center text-white text-3xl font-black"
          >
            <img
              src="./img/logoLM.png"
              alt="logo L&M"
              class="h-24 w-28 rounded-full object-contain mx-auto shadow-inner"
            />
          </div>
        </div>
      </div>

      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">
        L&M Ofertas <span class="text-green-500">📦</span>
      </h1>
      <p class="text-gray-500 text-sm mb-8 leading-relaxed">
        Achadinhos verificados do Mercado Livre, Amazon e Shopee com
        <span class="font-bold text-gray-800">Frete Grátis</span> e entrega
        rápida.
      </p>

      <div class="bg-gray-50 rounded-3xl p-6 mb-8 border border-gray-100">
        <div
          class="flex items-center justify-center gap-2 text-xs font-bold text-green-600 uppercase tracking-widest mb-3"
        >
          <span
            class="flex h-2 w-2 rounded-full bg-green-500 animate-ping"
          ></span>
          Canal Atualizado Hoje
        </div>
        <p class="text-gray-700 text-[13px] font-medium leading-tight">
          Receba cupons exclusivos e promoções que duram poucos minutos direto
          no seu celular.
        </p>
      </div>

      <a
        href="https://chat.whatsapp.com/DZSmBWszAzn3smdcN39AdJ?mode=gi_t"
        class="animate-pulse-custom flex items-center justify-center gap-4 w-full bg-[#25D366] hover:bg-[#20ba5a] text-white text-xl font-extrabold py-5 rounded-[2rem] shadow-[0_12px_45px_rgba(37,211,102,0.35)] transition-all active:scale-95"
      >
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
          alt="WhatsApp"
          class="w-8 h-8 pointer-events-none"
        />

        ENTRAR NO CANAL VIP
      </a>

      <p class="text-gray-400 text-[10px] uppercase tracking-widest mt-10">
        🔒 Ambiente 100% Seguro & Gratuito
      </p>
    </div>
  </body>
</html>
